{% extends "shop/base.html" %}
{% block title %}Каталог{% endblock %}

{% block content %}
<h1 class="mb-4">Все товары</h1>

<div class="row">
    {% for product in products %}
        <div class="col-md-4 mb-4">
            
                <h5>{{ product.title }}</h5>
                <p class="text-muted">{{ product.price }} ₽</p>

                <a href="{% url 'shop:product_detail' pk=product.pk %}" class="btn btn-primary">
                    Подробнее
                </a>
            </div>
        </div>
    {% empty %}
        <p>Нет товаров</p>
    {% endfor %}
</div>
{% endblock %}
