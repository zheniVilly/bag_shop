{% extends "shop/base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<h2>Регистрация</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Создать аккаунт</button>
</form>

<p class="mt-3">
    Уже есть аккаунт?
    <a href="{% url 'shop:login' %}">Войти</a>
</p>
{% endblock %}
